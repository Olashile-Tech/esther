<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #ff758c, #ff7eb3);
    color: white;
    text-align: center;
}

/* Card */
.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
}

/* Typing */
#text {
    font-size: 18px;
    margin-top: 15px;
    min-height: 60px;
}

/* Button */
button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: white;
    color: #ff4e8a;
    cursor: pointer;
}

/* Balloons */
.balloon {
    position: absolute;
    bottom: -100px;
    width: 40px;
    height: 60px;
    border-radius: 50%;
    animation: float 6s infinite;
}

.balloon:nth-child(1){left:10%;background:red;}
.balloon:nth-child(2){left:30%;background:yellow;}
.balloon:nth-child(3){left:50%;background:green;}
.balloon:nth-child(4){left:70%;background:blue;}
.balloon:nth-child(5){left:90%;background:purple;}

@keyframes float {
    0%{transform:translateY(0);}
    100%{transform:translateY(-110vh);}
}

/* Fireworks canvas */
canvas {
    position: fixed;
    top: 0;
    left: 0;
}
</style>
</head>

<body>

<!-- Music (tap button to play) -->
<audio id="music" loop>
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b1fdb.mp3" type="audio/mp3">
</audio>

<div class="card">
    <h1>🎉 Happy Birthday Esther 🎂</h1>
    <div id="text"></div>

    <button onclick="startAll(); this.disabled=true;">Tap Me 🎁</button>

    <p id="extra" style="display:none;">
        You are special to me 💖✨
    </p>
</div>

<!-- Balloons -->
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>

<!-- Fireworks -->
<canvas id="canvas"></canvas>

<script>
// Typing effect
let msg = "On your special day, I just want to remind you how amazing you are 💖";
let i = 0;

function type() {
    if (i < msg.length) {
        document.getElementById("text").innerHTML += msg.charAt(i);
        i++;
        setTimeout(type, 40);
    }
}

// Fireworks
let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function firework(x, y) {
    for (let i = 0; i < 40; i++) {
        particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5,
            life: 100
        });
    }
}

function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach((p, index) => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;

        ctx.fillStyle = "white";
        ctx.fillRect(p.x, p.y, 2, 2);

        if (p.life <= 0) particles.splice(index,1);
    });

    requestAnimationFrame(animate);
}
animate();

// FIXED: Start everything on button click
function startAll() {
    let music = document.getElementById("music");

    // Ensure music is ready to play
    if (music.paused) {
        music.play().catch(err => {
            console.log("Audio blocked, user interaction required");
        });
    }

    // Show extra message
    document.getElementById("extra").style.display = "block";

    // Start typing effect
    i = 0;
    document.getElementById("text").innerHTML = "";
    type();

    // Start fireworks automatically
    setInterval(() => {
        firework(Math.random()*canvas.width, Math.random()*canvas.height/2);
    }, 800);
}
</script>


</body>
</html>
