<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎉</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(to right, #ff758c, #ff7eb3);
        overflow: hidden;
        color: white;
        text-align: center;
    }
#fireworks {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

    .card {
        position: relative;
        top: 50%;
        transform: translateY(-50%);
        margin: auto;
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 20px;
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        width: 80%;
        max-width: 400px;
    }

    h1 {
        font-size: 2rem;
    }

    #typing {
        font-size: 1.2rem;
        margin-top: 15px;
        min-height: 80px;
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        border: none;
        border-radius: 25px;
        background: white;
        color: #ff4e8a;
        cursor: pointer;
    }

    /* 🎈 Balloons */
    .balloon {
        position: absolute;
        bottom: -150px;
        width: 40px;
        height: 60px;
        background: red;
        border-radius: 50%;
        animation: float 6s infinite;
    }

    .balloon:nth-child(1) { left: 10%; background: #ff4e8a; animation-duration: 5s; }
    .balloon:nth-child(2) { left: 30%; background: #ffd166; animation-duration: 6s; }
    .balloon:nth-child(3) { left: 50%; background: #06d6a0; animation-duration: 7s; }
    .balloon:nth-child(4) { left: 70%; background: #118ab2; animation-duration: 5.5s; }
    .balloon:nth-child(5) { left: 90%; background: #ef476f; animation-duration: 6.5s; }

    @keyframes float {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-110vh); opacity: 0; }
    }
</style>
</head>

<body>

<!-- 🎶 Background Music -->
<audio autoplay loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<div class="card">
    <h1>🎉 Happy Birthday, Esther! 🎂</h1>

    <div id="typing"></div>

    <button onclick="showMessage()">Click Me 🎁</button>

    <p id="hiddenMessage" style="display:none; margin-top:15px;">
        You are truly a special being… happy birthday to you 😊💖
    </p>
</div>

<!-- 🎈 Balloons -->
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>

<script>
    // ⌨️ Typing Animation
    const text = "On your special day, I just want to say... You are amazing, beautiful, and one of the best people to be with 💖✨";
    let index = 0;

    function typeEffect() {
        if (index < text.length) {
            document.getElementById("typing").innerHTML += text.charAt(index);
            index++;
            setTimeout(typeEffect, 40);
        }
    }

    typeEffect();

    function showMessage() {
        document.getElementById("hiddenMessage").style.display = "block";
    }
</script>
<script>
const canvas = document.getElementById("fireworks");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

function createFirework(x, y) {
    for (let i = 0; i < 50; i++) {
        particles.push({
            x: x,
            y: y,
            speedX: (Math.random() - 0.5) * 6,
            speedY: (Math.random() - 0.5) * 6,
            size: Math.random() * 3 + 2,
            life: 100
        });
    }
}

function updateParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach((p, index) => {
        p.x += p.speedX;
        p.y += p.speedY;
        p.life--;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = hsl(${Math.random() * 360}, 100%, 50%);
        ctx.fill();

        if (p.life <= 0) {
            particles.splice(index, 1);
        }
    });

    requestAnimationFrame(updateParticles);
}

updateParticles();

// 🎆 Trigger fireworks on click
document.body.addEventListener("click", (e) => {
    createFirework(e.clientX, e.clientY);
});
</script>
<canvas id="fireworks"></canvas>
</body>
</html>
